<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="donutGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glazeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Donut base -->
  <circle cx="256" cy="256" r="200" fill="url(#donutGradient)"/>
  <!-- Donut hole -->
  <circle cx="256" cy="256" r="80" fill="#fff"/>
  <!-- Glaze drip effect -->
  <path d="M100 256 Q256 180 412 256 Q350 320 256 350 Q162 320 100 256" fill="url(#glazeGradient)" opacity="0.9"/>
  <!-- Sprinkles -->
  <g fill="#fff" opacity="0.9">
    <ellipse cx="150" cy="220" rx="6" ry="4" transform="rotate(-15 150 220)"/>
    <ellipse cx="180" cy="200" rx="5" ry="3" transform="rotate(10 180 200)"/>
    <ellipse cx="220" cy="190" rx="4" ry="3" transform="rotate(-20 220 190)"/>
    <ellipse cx="290" cy="190" rx="5" ry="3" transform="rotate(15 290 190)"/>
    <ellipse cx="330" cy="200" rx="4" ry="3" transform="rotate(-10 330 200)"/>
    <ellipse cx="360" cy="220" rx="6" ry="4" transform="rotate(20 360 220)"/>
    <ellipse cx="140" cy="300" rx="5" ry="3" transform="rotate(10 140 300)"/>
    <ellipse cx="200" cy="320" rx="4" ry="3" transform="rotate(-15 200 320)"/>
    <ellipse cx="260" cy="330" rx="5" ry="3" transform="rotate(5 260 330)"/>
    <ellipse cx="320" cy="320" rx="4" ry="3" transform="rotate(-10 320 320)"/>
    <ellipse cx="370" cy="300" rx="6" ry="4" transform="rotate(15 370 300)"/>
  </g>
  <!-- Chocolate sprinkles -->
  <g fill="#4a2c0a">
    <ellipse cx="170" cy="240" rx="4" ry="2" transform="rotate(-5 170 240)"/>
    <ellipse cx="230" cy="250" rx="3" ry="2" transform="rotate(10 230 250)"/>
    <ellipse cx="300" cy="240" rx="4" ry="2" transform="rotate(-8 300 240)"/>
    <ellipse cx="350" cy="260" rx="3" ry="2" transform="rotate(12 350 260)"/>
    <ellipse cx="180" cy="280" rx="4" ry="2" transform="rotate(5 180 280)"/>
    <ellipse cx="280" cy="290" rx="3" ry="2" transform="rotate(-10 280 290)"/>
  </g>
</svg>