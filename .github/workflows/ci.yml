# CI for DowgNut-Z — runs lint, typecheck, test, and build on every push/PR.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  build:
    name: Lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 12

    env:
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint

      - name: Typecheck (implicit tsc --noEmit via next build)
        # Note: next build itself runs tsc; no separate step required.

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Upload .next (optional for debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: next-build-trace
          path: .next
          retention-days: 3
