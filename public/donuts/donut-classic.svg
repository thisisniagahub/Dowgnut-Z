<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <!-- Drop shadow -->
  <ellipse cx="100" cy="175" rx="70" ry="8" fill="#07334F" opacity="0.12"/>
  <!-- Dough body (classic — caramel/brown) -->
  <circle cx="100" cy="100" r="80" fill="#C49A6C"/>
  <!-- Dough inner ring -->
  <circle cx="100" cy="100" r="28" fill="#FFF9E8"/>
  <!-- Glaze (classic — chocolate brown) -->
  <path d="M100 22 A78 78 0 1 1 99.99 22 Z M100 58 A42 42 0 1 0 100.01 58 Z" fill="#8B4513" fill-rule="evenodd"/>
  <!-- Glaze highlight -->
  <path d="M55 55 Q70 35 100 30 Q130 35 145 55" stroke="#A0522D" stroke-width="4" stroke-linecap="round" opacity="0.6" fill="none"/>
  <!-- Inner ring edge -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="#B8860B" stroke-width="2" opacity="0.3"/>
  <!-- Outer edge -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#8B6914" stroke-width="2" opacity="0.2"/>
  <!-- Subtle glaze shine -->
  <ellipse cx="75" cy="60" rx="25" ry="12" fill="#FFF" opacity="0.15" transform="rotate(-30 75 60)"/>
</svg>
